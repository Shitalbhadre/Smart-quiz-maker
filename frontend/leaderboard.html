<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Quiz Master</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --jambhala-purple: #7c3aed;
      --jambhala-blue: #3b82f6;
      --jambhala-cyan: #06b6d4;
      --jambhala-violet: #a78bfa;
      --jambhala-indigo: #4f46e5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      min-height: 100vh;
      padding: 30px 20px;
    }

    @keyframes gradientShift {
      0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
      50% { background: linear-gradient(135deg, #f093fb 0%, #4facfe 50%, #667eea 100%); }
    }

    .leaderboard-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 40px 30px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-content { display: flex; justify-content: space-between; align-items: center; gap: 30px; flex-wrap: wrap; }
    .header-title { flex: 1; text-align: center; min-width: 300px; }
    .trophy-emoji { font-size: 3.5rem; animation: bounce 2s ease-in-out infinite; display: inline-block; margin-bottom: 15px; }

    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    .header-title h2 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--jambhala-purple) 0%, var(--jambhala-indigo) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .back-button {
      background: linear-gradient(135deg, #10b981 0%, #047857 100%);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 25px;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .leaderboard-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .table thead th {
      background: linear-gradient(135deg, var(--jambhala-purple) 0%, var(--jambhala-indigo) 100%);
      color: white;
      padding: 18px 15px !important;
      text-transform: uppercase;
    }

    .rank-badge { padding: 8px 16px; border-radius: 20px; font-weight: 700; display: inline-block; }
    .rank-1 { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: white; }
    .rank-2 { background: linear-gradient(135deg, #d1d5db 0%, #9ca3af 100%); color: white; }
    .rank-3 { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; }

    .score-cell { font-weight: 800; font-size: 1.2rem; color: var(--jambhala-purple); text-align: center; }
  </style>
</head>
<body>

  <div class="leaderboard-header">
    <div class="header-content">
      <button class="back-button" onclick="goBack()">← Back</button>
      <div class="header-title">
        <div class="trophy-emoji">🏆</div>
        <h2>Leaderboard</h2>
        <p id="leaderboardTitle">Overall Rankings</p>
      </div>
      <div style="width: 100px;"></div>
    </div>
  </div>

  <div class="leaderboard-container">
    <div id="leaderboardContainer">
      <div class="d-flex justify-content-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('quizId');

    if (!token) {
      alert('❌ Please login first.');
      window.location.href = 'login.html';
    }

  async function loadLeaderboard() {
  try {
    // Determine if we are looking for a limited leaderboard or full marksheet
    // We can use a URL parameter like &mode=full
    const isFullMarksheet = urlParams.get('mode') === 'full';
    
    let url = `https://smart-quiz-maker.onrender.com/api/answer/leaderboard/${quizId}`;

    const response = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    let data = await response.json();

    // LOGIC: If it's the leaderboard, show only 10. 
    // If it's the marksheet, show everyone.
    if (!isFullMarksheet) {
        data = data.slice(0, 10); 
        document.getElementById('leaderboardTitle').textContent = '🏆 Top 10 Leaderboard';
    } else {
        document.getElementById('leaderboardTitle').textContent = '📋 Full Student Marksheet';
    }

    displayLeaderboard(data);
  } catch (error) {
    console.error(error);
  }
}

    function displayLeaderboard(data) {
      const container = document.getElementById('leaderboardContainer');
      if (data.length === 0) {
        container.innerHTML = '<div class="text-center py-5"><h3>No Results Yet</h3></div>';
        return;
      }

      let tableHTML = `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student Name</th>
                <th>Score</th>
                <th>Submitted</th>
              </tr>
            </thead>
            <tbody>`;

      data.forEach((entry, index) => {
        const rank = index + 1;
        const score = entry.score;
        const total = entry.total || 0;
        const submittedDate = entry.submittedAt ? new Date(entry.submittedAt).toLocaleString() : 'N/A';

        let rankBadge = `<span class="rank-badge bg-secondary text-white">${rank}th</span>`;
        if (rank === 1) rankBadge = `<span class="rank-badge rank-1">🥇 1st</span>`;
        if (rank === 2) rankBadge = `<span class="rank-badge rank-2">🥈 2nd</span>`;
        if (rank === 3) rankBadge = `<span class="rank-badge rank-3">🥉 3rd</span>`;

        tableHTML += `
          <tr>
            <td class="text-center">${rankBadge}</td>
            <td class="fw-bold">${entry.studentName || 'Unknown'}</td>
            <td class="score-cell">${score} / ${total}</td>
            <td class="text-muted">${submittedDate}</td>
          </tr>`;
      });

      tableHTML += '</tbody></table></div>';
      container.innerHTML = tableHTML;
    }

    function goBack() { window.history.back(); }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000); // Auto refresh
  </script>
</body>
</html>
