<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Quiz App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
    }

    h3 {
      color: #555;
      text-align: center;
      margin-bottom: 30px;
      font-size: 18px;
      font-weight: 400;
    }

    .form-control {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
    }

    .btn-success:active {
      transform: translateY(0);
    }

    #msg {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    #msg.show {
      display: block;
    }

    #msg.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #msg.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .password-requirements {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
      padding: 15px;
      background-color: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .password-requirements ul {
      margin-left: 20px;
      margin-top: 8px;
    }

    .password-requirements li {
      margin-bottom: 5px;
    }

    .icon {
      text-align: center;
      margin-bottom: 20px;
      font-size: 50px;
      color: #11998e;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      padding: 0;
      width: auto;
    }

    .toggle-password:hover {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔑</div>
    <h2>Reset Password</h2>
    <h3>Set your new password</h3>
    
    <div class="password-requirements">
      <strong>Password Requirements:</strong>
      <ul>
        <li>At least 8 characters long</li>
        <li>Contains letters and numbers</li>
      </ul>
    </div>

    <div class="password-wrapper">
      <input 
        type="password" 
        id="newPass" 
        class="form-control" 
        placeholder="Enter new password"
        required
      >
      <button class="toggle-password" onclick="togglePassword()" type="button">👁️</button>
    </div>
    
    <button class="btn btn-success" onclick="updatePassword()">Update Password</button>
    
    <p id="msg"></p>
  </div>

  <script>
    function togglePassword() {
      const passInput = document.getElementById('newPass');
      const toggleBtn = document.querySelector('.toggle-password');
      
      if (passInput.type === 'password') {
        passInput.type = 'text';
        toggleBtn.textContent = '👁️‍🗨️';
      } else {
        passInput.type = 'password';
        toggleBtn.textContent = '👁️';
      }
    }

    async function updatePassword() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const password = document.getElementById('newPass').value;
      const msgEl = document.getElementById('msg');

      if (!token) {
        msgEl.innerText = 'Invalid reset link. Please request a new password reset.';
        msgEl.className = 'show error';
        return;
      }

      if (!password) {
        msgEl.innerText = 'Please enter a new password';
        msgEl.className = 'show error';
        return;
      }

      if (password.length < 8) {
        msgEl.innerText = 'Password must be at least 8 characters long';
        msgEl.className = 'show error';
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/api/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();
        
        if (res.ok) {
          msgEl.innerText = 'Password updated successfully! Redirecting to login...';
          msgEl.className = 'show success';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          msgEl.innerText = data.message || 'Failed to update password';
          msgEl.className = 'show error';
        }
      } catch (error) {
        msgEl.innerText = 'An error occurred. Please try again.';
        msgEl.className = 'show error';
      }
    }

    // Allow Enter key to submit
    document.getElementById('newPass').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        updatePassword();
      }
    });
  </script>
</body>
</html>
