  <script>
   let questionCount = 0;
const user = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!user || user.role !== 'Quiz Maker') {
  alert('Access denied! Only Quiz Makers can access this page.');
  window.location.href = 'login.html';
}

document.getElementById('welcomeText').textContent = `Welcome, ${user.name}!`;

// Global variables for modal data
let currentQuizResults = [];
let currentQuizSubject = "";
let currentTotalMarks = 0;
let currentQuizQuestions = [];



async function deleteQuiz(quizId) {
  if (!confirm("⚠️ Are you sure? This will delete the quiz and all student marks permanently.")) return;
  try {
    const res = await fetch(`https://smart-quiz-maker.onrender.com/api/quiz/${quizId}`, {
      method: 'DELETE',
      headers: { 
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const data = await res.json();
    
    if (res.ok) {
      alert("✅ Quiz deleted successfully!");
      loadMyQuizzes();
    } else {
      alert("❌ Error: " + (data.message || "Failed to delete quiz"));
    }
  } catch (err) {
    console.error('Delete error:', err);
    alert("❌ Error deleting quiz: " + err.message);
  }
}



async function editQuiz(id) {
  try {
    const res = await fetch(`https://smart-quiz-maker.onrender.com/api/quiz/${id}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const quiz = await res.json();
    if (!res.ok) return alert('Failed to load quiz');

    // 1. Show form and fill main details
    document.getElementById('createQuizForm').classList.remove('d-none');
    document.getElementById('subject').value = quiz.subject;
    document.getElementById('description').value = quiz.description;
    
    // 2. Clear existing questions and RESET counter
    const container = document.getElementById('questionsContainer');
    container.innerHTML = ''; 
    questionCount = 0; // RESET this so IDs start from 1 again

    // 3. Populate questions
    quiz.questions.forEach((q, index) => {
      addQuestion(); // This increments questionCount and creates the IDs
      
      const currentNum = questionCount; // The number just generated by addQuestion()
      
      // Fill the fields using your ID pattern
      document.getElementById(`question${currentNum}`).value = q.question;
      document.getElementById(`q${currentNum}opt0`).value = q.options[0];
      document.getElementById(`q${currentNum}opt1`).value = q.options[1];
      document.getElementById(`q${currentNum}opt2`).value = q.options[2];
      document.getElementById(`q${currentNum}opt3`).value = q.options[3];
      
      // Handle correct answer (Finding the index of the correct string)
      const correctIndex = q.options.indexOf(q.correctAnswer);
      if (correctIndex !== -1) {
        document.getElementById(`q${currentNum}correct`).value = correctIndex;
      }
    });

    editingQuizId = id; 
    document.getElementById('formTitle').textContent = "✏️ Edit Quiz";
    window.scrollTo(0, 0);

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = "🔄 Update Quiz"; // Change button text
  saveBtn.onclick = () => updateQuiz(id); // Tell it to call updateQuiz instead of createQuiz

  } catch (err) {
    console.error('Error:', err);
  }
}

// ✅ FIXED AI FUNCTION
    async function askAI() {
      const prompt = document.getElementById("aiPrompt").value.trim();
      if (!prompt) {
        alert("Please enter a prompt");
        return;
      }

      const chatBox = document.getElementById("aiChatBox");

      // Show user message
      chatBox.innerHTML += `
        <div class="chat-user">
          <div class="chat-title">You</div>
          ${prompt}
        </div>
      `;

      document.getElementById("aiPrompt").value = "";

      // Show loading
      chatBox.innerHTML += `
        <div class="chat-ai">
          <div class="chat-title">AI</div>
          Generating questions...
        </div>
      `;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch("https://smart-quiz-maker.onrender.com/api/ai/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}` // ✅ FIX: Added token
          },
          body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        // Remove loading message
        const loadingMsg = chatBox.lastElementChild;
        if (loadingMsg) loadingMsg.remove();

        if (response.ok) {
          chatBox.innerHTML += `
            <div class="chat-ai">
              <div class="chat-title">AI</div>
              ${data.response}
            </div>
          `;
        } else {
          chatBox.innerHTML += `
            <div class="chat-ai">
              <div class="chat-title">AI</div>
              ❌ Error: ${data.response || 'Failed to generate'}
            </div>
          `;
        }
      } catch (err) {
        console.error('AI Error:', err);
        chatBox.innerHTML += `
          <div class="chat-ai">
            <div class="chat-title">AI</div>
            ❌ Connection error. Check console.
          </div>
        `;
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }


async function updateQuiz(id) {
  const subject = document.getElementById('subject').value.trim();
  const description = document.getElementById('description').value.trim();
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  const messageDiv = document.getElementById('message');
  
  // Validation
  if (!subject || !description || !startTime || !endTime) {
    messageDiv.innerHTML = '<p class="text-danger">Please fill in all quiz details</p>';
    return;
  }
  
  const questions = [];
  const questionCards = document.querySelectorAll('#questionsContainer .card');
  
  questionCards.forEach(card => {
    const qNum = card.id.replace('questionCard','');
    const question = document.getElementById(`question${qNum}`)?.value?.trim();
    const options = [
      document.getElementById(`q${qNum}opt0`)?.value?.trim(),
      document.getElementById(`q${qNum}opt1`)?.value?.trim(),
      document.getElementById(`q${qNum}opt2`)?.value?.trim(),
      document.getElementById(`q${qNum}opt3`)?.value?.trim()
    ];
    const correctIdx = parseInt(document.getElementById(`q${qNum}correct`)?.value);
    
    if (question && options.every(o => o)) {
      questions.push({ 
        question, 
        options, 
        correctAnswer: options[correctIdx] 
      });
    }
  });

  if (questions.length === 0) {
    messageDiv.innerHTML = '<p class="text-danger">Please add at least one complete question</p>';
    return;
  }

  const updateData = {
    subject,
    description,
    questions,
    startTime,
    endTime
  };

  try {
    const res = await fetch(`https://smart-quiz-maker.onrender.com/api/quiz/${id}`, {
      method: 'PUT',
      headers: { 
        'Content-Type': 'application/json', 
        'Authorization': `Bearer ${token}` 
      },
      body: JSON.stringify(updateData)
    });

    // Parse response
    let responseData;
    const contentType = res.headers.get("content-type");
    
    if (contentType && contentType.includes("application/json")) {
      responseData = await res.json();
    } else {
      const text = await res.text();
      console.error('Non-JSON Response:', text);
      throw new Error('Server returned HTML instead of JSON. Check backend route!');
    }

    if (res.ok) {
      messageDiv.innerHTML = '<p class="text-success">✅ Quiz updated successfully!</p>';
      setTimeout(() => {
        cancelCreateQuiz();
        loadMyQuizzes();
      }, 1500);
    } else {
      messageDiv.innerHTML = `<p class="text-danger">❌ ${responseData.message || responseData.error || 'Failed to update quiz'}</p>`;
    }
  } catch (err) {
    console.error('Update error:', err);
    messageDiv.innerHTML = `<p class="text-danger">❌ ${err.message}</p>`;
  }
}

function filterQuizzes() {
  const input = document.getElementById('quizSearch').value.toLowerCase();
  const cards = document.querySelectorAll('#myQuizzes .col-md-6');
  
  let visibleCount = 0;
  
  cards.forEach(card => {
    const title = card.querySelector('h5').textContent.toLowerCase();
    const description = card.querySelector('.card-body').textContent.toLowerCase();
    
    if (title.includes(input) || description.includes(input)) {
      card.style.display = '';
      visibleCount++;
    } else {
      card.style.display = 'none';
    }
  });
  
  // Show message if no results
  if (visibleCount === 0 && input !== '') {
    if (!document.getElementById('noResultsMessage')) {
      const noResults = document.createElement('div');
      noResults.id = 'noResultsMessage';
      noResults.className = 'col-12 text-center p-4';
      noResults.innerHTML = '<p class="text-muted">No quizzes found matching your search.</p>';
      document.getElementById('myQuizzes').appendChild(noResults);
    }
  } else {
    const msg = document.getElementById('noResultsMessage');
    if (msg) msg.remove();
  }
}

function showCreateQuizForm() {
  const form = document.getElementById('createQuizForm');
  form.classList.remove('d-none');
  document.getElementById('formTitle').textContent = "✨ Create New Quiz";
  document.getElementById('saveBtn').textContent = "✅ Save Quiz";
  document.getElementById('saveBtn').onclick = createQuiz;
  document.getElementById('message').innerHTML = '';
  
  const now = new Date();
  const startTime = new Date(now.getTime());
  const endTime = new Date(now.getTime() + 60*60*1000);
  document.getElementById('startTime').value = formatDateTimeLocal(startTime);
  document.getElementById('endTime').value = formatDateTimeLocal(endTime);
  
  // Scroll to form
  setTimeout(() => {
    form.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function cancelCreateQuiz() {
  const form = document.getElementById('createQuizForm');
  form.classList.add('d-none');
  // Reset the button to default state
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = "✅ Save Quiz";
  saveBtn.onclick = createQuiz;
  questionCount = 0;
  document.getElementById('questionsContainer').innerHTML = '';
  document.getElementById('subject').value = '';
  document.getElementById('description').value = '';
  document.getElementById('startTime').value = '';
  document.getElementById('endTime').value = '';
  document.getElementById('message').innerHTML = '';
}

function formatDateTimeLocal(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth()+1).padStart(2,'0');
  const day = String(date.getDate()).padStart(2,'0');
  const hours = String(date.getHours()).padStart(2,'0');
  const minutes = String(date.getMinutes()).padStart(2,'0');
  return `${year}-${month}-${day}T${hours}:${minutes}`;
}

function addQuestion() {
  questionCount++;
  const container = document.getElementById('questionsContainer');
  const div = document.createElement('div');
  div.className = 'card mb-3 p-3';
  div.id = `questionCard${questionCount}`;
  div.innerHTML = `
    <h5>❓ Question ${questionCount}</h5>
    <input type="text" id="question${questionCount}" class="form-control mb-2" placeholder="Enter your question">
    <input type="text" id="q${questionCount}opt0" class="form-control mb-2" placeholder="Option 1">
    <input type="text" id="q${questionCount}opt1" class="form-control mb-2" placeholder="Option 2">
    <input type="text" id="q${questionCount}opt2" class="form-control mb-2" placeholder="Option 3">
    <input type="text" id="q${questionCount}opt3" class="form-control mb-2" placeholder="Option 4">
    <select id="q${questionCount}correct" class="form-select mb-2">
      <option value="0">Option 1 is Correct</option>
      <option value="1">Option 2 is Correct</option>
      <option value="2">Option 3 is Correct</option>
      <option value="3">Option 4 is Correct</option>
    </select>
    <button class="btn btn-danger" onclick="removeQuestion(${questionCount})">🗑️ Remove Question</button>
  `;
  container.appendChild(div);
}

function removeQuestion(qNum) {
  const questionCard = document.getElementById(`questionCard${qNum}`);
  if (questionCard) questionCard.remove();
}

async function createQuiz() {
  const subject = document.getElementById('subject').value.trim();
  const description = document.getElementById('description').value.trim();
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  const messageDiv = document.getElementById('message');

  if (!subject || !description || !startTime || !endTime) {
    messageDiv.innerHTML = '<p class="text-danger">Please fill in all quiz details</p>';
    return;
  }

  const questions = [];
  const container = document.getElementById('questionsContainer');
  const questionCards = container.querySelectorAll('.card');

  questionCards.forEach(card => {
    const qNum = card.id.replace('questionCard','');
    const question = document.getElementById(`question${qNum}`)?.value?.trim();
    const options = [
      document.getElementById(`q${qNum}opt0`)?.value?.trim(),
      document.getElementById(`q${qNum}opt1`)?.value?.trim(),
      document.getElementById(`q${qNum}opt2`)?.value?.trim(),
      document.getElementById(`q${qNum}opt3`)?.value?.trim()
    ];
    const correctAnswerIndex = parseInt(document.getElementById(`q${qNum}correct`)?.value);
    const correctAnswer = options[correctAnswerIndex];
    if (question && options.every(opt=>opt)) {
      questions.push({ question, options, correctAnswer });
    }
  });

  if (questions.length===0) {
    messageDiv.innerHTML = '<p class="text-danger">Please add at least one complete question</p>';
    return;
  }

  try {
    const res = await fetch('https://smart-quiz-maker.onrender.com/api/quiz', {
      method: 'POST',
      headers: { 
        'Content-Type':'application/json', 
        'Authorization':`Bearer ${token}` 
      },
      body: JSON.stringify({ subject, description, questions, startTime, endTime })
    });
    const data = await res.json();
    if (res.ok) {
      messageDiv.innerHTML = '<p class="text-success">✨ Quiz created successfully!</p>';
      setTimeout(()=>{ 
        cancelCreateQuiz(); 
        loadMyQuizzes(); 
      }, 2000);
    } else {
      messageDiv.innerHTML = `<p class="text-danger">${data.error || data.message || 'Failed to create quiz'}</p>`;
    }
  } catch(err) {
    console.error(err);
    messageDiv.innerHTML = '<p class="text-danger">Connection error. Please try again.</p>';
  }
}

function openMarksheet(subject, students, totalMarks) {
  currentQuizResults = students;
  currentQuizSubject = subject;
  currentTotalMarks = totalMarks;
  
  document.getElementById('modalQuizInfo').textContent = `Subject: ${subject} | Total Marks: ${totalMarks}`;
  const tableBody = document.getElementById('modalStudentTable');
  
  if (students.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">No students participated yet.</td></tr>';
  } else {
    tableBody.innerHTML = students.map(s => `
      <tr>
        <td>👤 ${s.studentName || s.userName}</td>
        <td class="fw-bold text-primary">${s.score}</td>
        <td class="fw-bold">${totalMarks}</td>
      </tr>
    `).join('');
  }
  
  const myModal = new bootstrap.Modal(document.getElementById('marksheetModal'));
  myModal.show();
}

function openQuestions(subject, questions) {
  currentQuizQuestions = questions;
  currentQuizSubject = subject;
  
  document.getElementById('modalQuestionsInfo').textContent = `Subject: ${subject} | Total Questions: ${questions.length}`;
  const questionsContent = document.getElementById('questionsContent');
  
  if (questions.length === 0) {
    questionsContent.innerHTML = '<p class="text-center p-4">No questions available.</p>';
  } else {
    questionsContent.innerHTML = questions.map((q, idx) => `
      <div class="quiz-question">
        <h6 class="fw-bold mb-3">Q${idx + 1}. ${q.question}</h6>
        <div class="ms-3">
          ${q.options.map((opt, optIdx) => {
            const isCorrect = opt === q.correctAnswer;
            return `
              <div class="mb-2 ${isCorrect ? 'correct-answer' : ''}">
                ${String.fromCharCode(65 + optIdx)}. ${opt}
                ${isCorrect ? ' ✅ <strong>(Correct Answer)</strong>' : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');
  }
  
  const myModal = new bootstrap.Modal(document.getElementById('questionsModal'));
  myModal.show();
}

function shareToWhatsApp() {
  if (currentQuizResults.length === 0) return alert("No results to share");
  
  let text = `📊 *Exam Results: ${currentQuizSubject}*\n`;
  text += `*Total Marks: ${currentTotalMarks}*\n\n`;
  currentQuizResults.forEach((s, idx) => {
    text += `${idx + 1}. ${s.studentName || s.userName}: ${s.score}/${currentTotalMarks}\n`;
  });
  
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function downloadMarksheet() {
  if (currentQuizResults.length === 0) return alert("No results to download");
  
  let csv = "Student Name,Marks Obtained,Out Of\n";
  currentQuizResults.forEach(s => {
    csv += `${s.studentName || s.userName},${s.score},${currentTotalMarks}\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `${currentQuizSubject}_results.csv`);
  a.click();
}

async function loadMyQuizzes() {
  try {
    const res = await fetch('https://smart-quiz-maker.onrender.com/api/quiz/my-quizzes', { 
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (!res.ok) throw new Error("Failed to fetch quizzes");
    const quizzes = await res.json();
    
    const container = document.getElementById('myQuizzes');
    document.getElementById('totalQuizzesCount').textContent = quizzes.length;

    if (quizzes.length === 0) {
      container.innerHTML = '<div class="col-12 text-center p-4">No exams found.</div>';
      return;
    }

    // Use Promise.all to fetch the latest answers for EACH quiz to ensure Marksheet is full
    const quizCards = await Promise.all(quizzes.map(async (q) => {
      
      // FETCH ACTUAL SUBMISSIONS FROM THE ANSWER ROUTE (Matches your leaderboard logic)
      const answerRes = await fetch(`https://smart-quiz-maker.onrender.com/api/answer/leaderboard/${q._id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const studentsData = answerRes.ok ? await answerRes.json() : [];

      const totalStudents = studentsData.length;
      const totalMarks = q.questions.length;
      const now = new Date();
      const endTime = new Date(q.endTime);
      
      let timeStatus = now > endTime 
        ? `<span class="text-danger fw-bold">🛑 Time Finished</span>` 
        : `<span class="text-success">🟢 Active</span>`;

      // Clean JSON strings for HTML attributes
      const studentsJson = JSON.stringify(studentsData).replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const questionsJson = JSON.stringify(q.questions).replace(/'/g, "\\'").replace(/"/g, '&quot;');

      return `
        <div class="col-md-6 mb-4">
          <div class="card h-100 shadow-sm border-0" style="border-radius: 15px; border-top: 5px solid #7c3aed;">
            <div class="card-body p-4">
              <h5 class="fw-bold" style="color: #7c3aed">${q.subject}</h5>
              <div class="mb-2 small">
                <div>⌛ <b>End Time:</b> ${new Date(q.endTime).toLocaleString()}</div>
                <div class="mt-1">${timeStatus}</div>
              </div>
              <div class="p-2 mb-3 rounded d-flex justify-content-between align-items-center" style="background: #f3f4f6;">
                <small class="fw-bold text-secondary">👥 Students Participated:</small>
                <span class="badge bg-dark rounded-pill">${totalStudents}</span>
              </div>
              <div class="d-flex gap-2 mb-2">
                <button class="btn btn-info btn-sm text-white flex-grow-1 fw-bold" 
                  onclick='openMarksheet("${q.subject}", ${studentsJson}, ${totalMarks})'>
                  📋 View Marksheet (${totalStudents})
                </button>
                <button class="btn btn-secondary btn-sm flex-grow-1 fw-bold" 
                  onclick='openQuestions("${q.subject}", ${questionsJson})'>
                  📝 View Questions
                </button>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-primary flex-grow-1" onclick="viewLeaderboard('${q._id}')">🏆 Top 10</button>
                
                <button class="btn btn-sm btn-dark" onclick="editQuiz('${q._id}')">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteQuiz('${q._id}')">Delete</button>
              </div>
            </div>
          </div>
        </div>`;
    }));

    container.innerHTML = quizCards.join('');

  } catch (err) {
    console.error("Dashboard Load Error:", err);
    container.innerHTML = '<div class="text-danger text-center p-4">Error loading data.</div>';
  }
}

function viewLeaderboard(id) { 
  window.location.href = `leaderboard.html?quizId=${id}`; 
}

function logout() { 
  localStorage.removeItem('token'); 
  localStorage.removeItem('user'); 
  window.location.href = 'login.html'; 
}

// Load quizzes on page load
loadMyQuizzes();
