<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Quiz App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
    }

    h3 {
      color: #555;
      text-align: center;
      margin-bottom: 30px;
      font-size: 18px;
      font-weight: 400;
    }

    .form-control {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    #msg {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    #msg.show {
      display: block;
    }

    #msg.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #msg.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .icon {
      text-align: center;
      margin-bottom: 20px;
      font-size: 50px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔐</div>
    <h2>Forgot Password</h2>
    <h3>Reset your password</h3>
    
    <input 
      type="email" 
      id="email" 
      class="form-control" 
      placeholder="Enter your registered email"
      required
    >
    
    <button class="btn btn-primary" onclick="requestReset()">Send Reset Link</button>
    
    <p id="msg"></p>
    
    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>
  </div>

  <script>
    async function requestReset() {
      const email = document.getElementById('email').value;
      const msgEl = document.getElementById('msg');
      
      if (!email) {
        msgEl.innerText = 'Please enter your email address';
        msgEl.className = 'show error';
        return;
      }

      try {
        const res = await fetch('https://smart-quiz-maker.onrender.com/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        msgEl.innerText = data.message;
        msgEl.className = res.ok ? 'show success' : 'show error';
      } catch (error) {
        msgEl.innerText = 'An error occurred. Please try again.';
        msgEl.className = 'show error';
      }
    }

    // Allow Enter key to submit
    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        requestReset();
      }
    });
  </script>
</body>
</html>
